# This file is part of the jebel-quant/rhiza repository
# (https://github.com/jebel-quant/rhiza).
#
# Workflow: Semgrep (GitLab CI)
#
# Purpose: This workflow runs static analysis using Semgrep with local numpy
#          rules (.semgrep.yml) to detect common NumPy-related bugs and
#          security issues in Python code.
#
# Trigger: This workflow runs on every push and on merge requests to main/master
#          branches (including from forks)

semgrep:check:
  stage: test
  needs: []
  image: ghcr.io/astral-sh/uv:0.9.30-bookworm
  script:
    - make semgrep
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
