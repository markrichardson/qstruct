# This file is part of the jebel-quant/rhiza repository
# (https://github.com/jebel-quant/rhiza).
#
# Workflow: Marimo Notebooks (GitLab CI)
#
# Purpose: This workflow discovers and executes all Marimo notebooks in the
#          repository. It runs each notebook sequentially, accumulating failures
#          so all notebooks are attempted even if one fails (fail-fast: false
#          equivalent).
#
# Trigger: On push and merge requests to main/master branches.
#
# Components:
#   - 🔎 Discover notebooks in MARIMO_FOLDER (default: marimo)
#   - 🧪 Run each notebook, collecting artefacts
#   - 📦 Publish results/ as GitLab CI artefacts

marimo:notebooks:
  stage: test
  image: ghcr.io/astral-sh/uv:0.9.30-bookworm
  variables:
    GIT_LFS_SKIP_SMUDGE: "0"
  before_script:
    - apt-get update && apt-get install -y git-lfs make
    - git lfs install
    - git lfs pull
    - export UV_EXTRA_INDEX_URL="${UV_EXTRA_INDEX_URL}"
  script:
    - |
      # Discover the notebook directory from the Makefile (default: marimo)
      NOTEBOOK_DIR=$(make -s -f Makefile -f - <<< 'print: ; @echo $(or $(MARIMO_FOLDER),marimo)' print 2>/dev/null || echo "marimo")
      echo "Searching notebooks in: $NOTEBOOK_DIR"

      if [ ! -d "$NOTEBOOK_DIR" ]; then
        echo "Directory $NOTEBOOK_DIR does not exist. No notebooks to run."
        exit 0
      fi

      # Find notebooks
      mapfile -t NOTEBOOKS < <(find "$NOTEBOOK_DIR" -maxdepth 1 -name "*.py" | sort)

      if [ ${#NOTEBOOKS[@]} -eq 0 ]; then
        echo "No notebooks found in $NOTEBOOK_DIR."
        exit 0
      fi

      echo "Found ${#NOTEBOOKS[@]} notebook(s): ${NOTEBOOKS[*]}"

      # Run all notebooks, accumulating failures (fail-fast: false)
      FAILED=0
      for notebook in "${NOTEBOOKS[@]}"; do
        notebook_stem="$(basename "$notebook" .py)"
        artefact_folder="results/${notebook_stem}"
        mkdir -p "${artefact_folder}"
        export NOTEBOOK_OUTPUT_FOLDER="${artefact_folder}"
        echo "🚀 Running notebook: $notebook"
        if uv run "$notebook"; then
          echo "✅ $notebook passed"
        else
          echo "❌ $notebook FAILED"
          FAILED=$((FAILED + 1))
        fi
      done

      if [ $FAILED -gt 0 ]; then
        echo "$FAILED notebook(s) failed."
        exit 1
      fi
      echo "All notebooks passed."
  artifacts:
    paths:
      - results/
    expire_in: 1 week
    when: always
  allow_failure: false
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "master"
